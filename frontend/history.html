<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — Tweet Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div class="page-title" style="margin:0">Post History</div>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div>
        <select class="form-control" id="account-filter" style="width:180px">
          <option value="">All Accounts</option>
        </select>
      </div>
      <div class="pill-group" style="margin:0">
        <button class="pill active" data-status="">All</button>
        <button class="pill" data-status="posted">Posted</button>
        <button class="pill" data-status="failed">Failed</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Posted At</th>
              <th>Account</th>
              <th>Tweet</th>
              <th>Status</th>
              <th>Error</th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <tr><td colspan="5" class="empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <script src="nav.js"></script>
  <script>
    let currentPage   = 1;
    let currentAccId  = '';
    let currentStatus = '';

    // ── Load accounts into filter dropdown ─────────────────────────────────

    async function loadAccountFilter() {
      try {
        const accounts = await api('GET', '/accounts');
        const select   = document.getElementById('account-filter');
        accounts.forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.id;
          opt.textContent = `@${a.username}`;
          select.appendChild(opt);
        });
      } catch { /* non-fatal */ }
    }

    // ── Load history ───────────────────────────────────────────────────────

    async function loadHistory() {
      const tbody = document.getElementById('history-tbody');
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Loading…</td></tr>`;

      try {
        let path = `/history?page=${currentPage}`;
        if (currentAccId) path += `&account_id=${currentAccId}`;

        const items = await api('GET', path);

        // Client-side status filter (API returns all)
        const filtered = currentStatus ? items.filter(h => h.status === currentStatus) : items;

        if (!filtered.length) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No history found.</td></tr>`;
          renderPagination(0);
          return;
        }

        tbody.innerHTML = filtered.map(h => `
          <tr>
            <td style="white-space:nowrap;font-size:12px">${fmtDate(h.posted_at)}</td>
            <td>
              <div><strong>@${escHtml(h.username)}</strong></div>
              ${toneBadge(h.tone)}
            </td>
            <td>
              <span class="truncate" title="${escHtml(h.tweet_text)}">${escHtml(h.tweet_text)}</span>
              ${h.video_url ? `<div style="font-size:11px;color:var(--blue);margin-top:3px">🎬 video</div>` : ''}
            </td>
            <td>${statusBadge(h.status)}</td>
            <td>
              ${h.error_message
                ? `<span style="font-size:11px;color:var(--red)" title="${escHtml(h.error_message)}">${escHtml(h.error_message.slice(0, 60))}${h.error_message.length > 60 ? '…' : ''}</span>`
                : '<span style="color:var(--gray)">—</span>'}
            </td>
          </tr>
        `).join('');

        renderPagination(items.length);
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state" style="color:var(--red)">${e.message}</td></tr>`;
      }
    }

    // ── Pagination ─────────────────────────────────────────────────────────

    function renderPagination(count) {
      const pg = document.getElementById('pagination');
      const hasPrev = currentPage > 1;
      const hasNext = count === 20; // full page means there may be more

      if (!hasPrev && !hasNext) { pg.innerHTML = ''; return; }

      pg.innerHTML = `
        ${hasPrev ? `<button class="btn btn-outline btn-sm" id="prev-btn">← Prev</button>` : ''}
        <span>Page ${currentPage}</span>
        ${hasNext ? `<button class="btn btn-outline btn-sm" id="next-btn">Next →</button>` : ''}
      `;

      if (hasPrev) pg.querySelector('#prev-btn').onclick = () => { currentPage--; loadHistory(); };
      if (hasNext) pg.querySelector('#next-btn').onclick = () => { currentPage++; loadHistory(); };
    }

    // ── Event wiring ───────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      loadAccountFilter();

      // Account dropdown
      document.getElementById('account-filter').addEventListener('change', e => {
        currentAccId = e.target.value;
        currentPage  = 1;
        loadHistory();
      });

      // Status pills
      document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          currentStatus = pill.dataset.status;
          currentPage   = 1;
          loadHistory();
        });
      });

      loadHistory();
    });

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
